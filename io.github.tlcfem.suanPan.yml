app-id: io.github.tlcfem.suanPan
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: suanPan
finish-args:
  - '--filesystem=home'
  - '--socket=fallback-x11'
  - '--device=dri'
  - '--socket=wayland'
  - '--share=ipc'
cleanup:
  - /vtk
  - /oneapi
modules:
  - name: suanPan
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - '-DCMAKE_BUILD_TYPE=Release'
      - '-DMKL_PATH=/app/oneapi/mkl/latest'
      - '-DSP_BUILD_PARALLEL=ON'
      - '-DSP_ENABLE_AVX2=OFF'
      - '-DSP_ENABLE_HDF5=ON'
      - '-DSP_ENABLE_IOMP=OFF'
      - '-DSP_ENABLE_MKL=ON'
      - '-DSP_ENABLE_SHARED_MKL=OFF'
      - '-DSP_ENABLE_VTK=ON'
      - '-DSUANPAN_DATE="Apr 29 2026"'
      - '-DVTK_PATH=/app/vtk/lib/cmake/vtk-9.6/'
    post-install:
      - install -Dm644 ../Resource/suanPan-ua.svg /app/share/icons/hicolor/scalable/apps/io.github.tlcfem.suanPan.svg
      - install -Dm644 ../io.github.tlcfem.suanPan.metainfo.xml /app/share/metainfo/io.github.tlcfem.suanPan.metainfo.xml
      - install -Dm644 ../io.github.tlcfem.suanPan.desktop /app/share/applications/io.github.tlcfem.suanPan.desktop
    sources:
      - type: git
        url: https://github.com/TLCFEM/suanPan.git
        commit: edb174514a0705188ec85d2219ef2bb638dd6c1e
      - type: file
        path: io.github.tlcfem.suanPan.metainfo.xml
      - type: file
        path: io.github.tlcfem.suanPan.desktop
    modules:
      - name: vtk
        buildsystem: cmake-ninja
        builddir: true
        config-opts:
          - '-DCMAKE_BUILD_TYPE=Release'
          - '-DBUILD_SHARED_LIBS=OFF'
          - '-DCMAKE_INSTALL_PREFIX=/app/vtk'
          - '-DCMAKE_CXX_FLAGS=-Wno-stringop-overflow -Wno-stringop-overread'
        sources:
          - type: archive
            url: https://vtk.org/files/release/9.6/VTK-9.6.1.tar.gz
            sha256: 47ca9af899165a33b935533046acce7c0aa3c007f0b57880665bb89d9986543f
      - name: mkl
        only-arches:
          - x86_64
        buildsystem: simple
        build-commands:
          - sh ./intel-onemkl-2026.0.0.909_offline.sh -a --silent --eula accept --install-dir /app/oneapi
        sources:
          - type: file
            url: https://registrationcenter-download.intel.com/akdlm/IRC_NAS/db60f483-f02e-4f7e-9bcd-5e01dba97444/intel-onemkl-2026.0.0.909_offline.sh
            sha256: f63fd6ce3a374993caa0482fec0a3b9f2c312beeabff82009ab51fca90c97225
